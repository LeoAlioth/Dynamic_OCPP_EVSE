# Test scenarios: Battery-backed smart plug SOC-based on/off
#
# A smart plug is a binary on/off load. With a battery configured the battery
# is the stored-solar buffer, and each plug mode drains it only to a
# progressively higher SOC floor (none of them use the grid):
#   - Solar Priority: plug ON while battery SOC > minimum SOC
#   - Solar Only:     plug ON while battery SOC > target SOC
#   - Excess:         plug ON while battery SOC >= "full" SOC, or the site is
#                     exporting
# EVSEs are unaffected (they keep modulating). See _source_limit() in
# target_calculator.py and BEHAVIOR_BY_MODE in const/modes.py.
#
# All scenarios use a dedicated solar entity (solar_production_direct: true) so
# battery discharge is added to the inverter pool, and night-time solar (0 W)
# so the plug must run off the battery — the point of SOC-based control.

scenarios:

  - name: "battery-plug-solar-priority-above-min"
    description: "Battery plug, Solar Priority, SOC 50% > min 20% → plug ON"
    human_verified: false
    site:
      voltage: 230
      main_breaker_rating: 35
      distribution_mode: priority
      solar_production_direct: true
      solar_production: 0
      phase_a_consumption: 1.0
      battery_soc: 50
      battery_soc_min: 20
      battery_soc_target: 80
      battery_max_charge_power: 5000
      battery_max_discharge_power: 5000
      inverter_supports_asymmetric: false
      inverter_max_power_per_phase: 12000
      inverter_max_power: 12000
    chargers:
      - entity_id: "plug_1"
        device_type: "plug"
        operating_mode: "Solar Priority"
        power_rating: 1500
        phases: 1
        priority: 1
        l1_phase: "A"
    expected:
      plug_1:
        allocated: 6.5  # SOC 50 > min 20 → on; 1500W / 230V = 6.5A

  - name: "battery-plug-solar-priority-below-min"
    description: "Battery plug, Solar Priority, SOC 15% < min 20% → plug OFF"
    human_verified: false
    site:
      voltage: 230
      main_breaker_rating: 35
      distribution_mode: priority
      solar_production_direct: true
      solar_production: 0
      phase_a_consumption: 1.0
      battery_soc: 15
      battery_soc_min: 20
      battery_soc_target: 80
      battery_max_charge_power: 5000
      battery_max_discharge_power: 5000
      inverter_supports_asymmetric: false
      inverter_max_power_per_phase: 12000
      inverter_max_power: 12000
    chargers:
      - entity_id: "plug_1"
        device_type: "plug"
        operating_mode: "Solar Priority"
        power_rating: 1500
        phases: 1
        priority: 1
        l1_phase: "A"
    expected:
      plug_1:
        allocated: 0.0  # SOC 15 below min 20 → off

  - name: "battery-plug-solar-only-above-target"
    description: "Battery plug, Solar Only, SOC 85% > target 80% → plug ON"
    human_verified: false
