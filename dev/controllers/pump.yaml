alias: Well Pump Controller
description: >
  Well pump ON/OFF control based on SOC and available inverter capacity. Load
  priority: 3 (lowest) — EVSE > Boiler > Pump. Pump yields to higher- priority
  loads via the inverter_5000_24_remaining_capacity check, which already
  reflects current EVSE and boiler draw. The pump may run alongside the boiler
  whenever capacity allows.
triggers:
  - minutes: "15"
    trigger: time_pattern
  - trigger: homeassistant
    event: start
  - entity_id:
      - sensor.sbms0_charge
    above: 35
    trigger: numeric_state
  - entity_id: input_number.kozolec_max_days_without_full_charge
    trigger: state
  - entity_id:
      - sensor.sbms0_charge
    below: 30
    trigger: numeric_state
  - entity_id:
      - sensor.inverter_5000_24_remaining_capacity
    above: 2000
    for: "00:01:30"
    trigger: numeric_state
  - entity_id:
      - sensor.inverter_5000_24_remaining_capacity
    below: 700
    for: "00:00:05"
    trigger: numeric_state
conditions: []
actions:
  - choose:
      - conditions:
          - condition: or
            conditions:
              - alias: insufficient capacity for pump
                condition: numeric_state
                entity_id: sensor.inverter_5000_24_remaining_capacity
                below: 700
              - condition: numeric_state
                entity_id: sensor.sbms0_charge
                below: 30
          - condition: state
            entity_id: switch.shellypro4pm_kozolec_switch_2
            state: "on"
        sequence:
          - action: switch.turn_off
            data: {}
            target:
              entity_id: switch.shellypro4pm_kozolec_switch_2
        alias: turn off
      - conditions:
          - condition: numeric_state
            entity_id: sensor.sbms0_charge
            above: 30
          - alias: remaining capacity fits pump
            condition: numeric_state
            entity_id: sensor.inverter_5000_24_remaining_capacity
            above: 2000
          - condition: state
            entity_id: switch.shellypro4pm_kozolec_switch_2
            state: "off"
        sequence:
          - action: switch.turn_on
            data: {}
            target:
              entity_id: switch.shellypro4pm_kozolec_switch_2
        alias: turn on
mode: single
