alias: Boiler Controller
description: >
  Unified boiler automation: controls ON/OFF state and preset_mode based on SOC,
  solar production, and load optimization. Load priority: 2 (middle) — EVSE >
  Boiler > Pump. Yields to EVSE via the inverter_5000_24_remaining_capacity
  check (which reflects EVSE draw).
triggers:
  - minutes: "10"
    trigger: time_pattern
  - trigger: homeassistant
    event: start
  - trigger: numeric_state
    entity_id:
      - sensor.inverter_5000_24_remaining_capacity
    above: 2800
    for: "00:01:00"
  - trigger: numeric_state
    entity_id:
      - sensor.inverter_5000_24_remaining_capacity
    below: 600
    for: "00:00:05"
  - trigger: state
    entity_id:
      - climate.kozolec_boiler
    attribute: preset_mode
    to:
      - none
    for:
      hours: 2
      minutes: 0
      seconds: 0
    id: override
  - trigger: numeric_state
    entity_id:
      - sensor.sbms0_charge
    for:
      hours: 0
      minutes: 0
      seconds: 30
    above: 40
  - trigger: numeric_state
    entity_id:
      - sensor.sbms0_charge
    for:
      hours: 0
      minutes: 0
      seconds: 30
    above: 90
  - trigger: numeric_state
    entity_id:
      - sensor.sbms0_charge
    for:
      hours: 0
      minutes: 0
      seconds: 30
    below: 30
conditions: []
actions:
  - alias: Adjust Boiler Mode
    choose:
      - conditions:
          - condition: numeric_state
            entity_id: sensor.sbms0_charge
            above: 90
        sequence:
          - if:
              - alias: Mode Not Activity
                condition: or
                conditions:
                  - condition: state
                    entity_id: climate.kozolec_boiler
                    attribute: preset_mode
                    state: away
                  - condition: state
                    entity_id: climate.kozolec_boiler
                    attribute: preset_mode
                    state: eco
              - alias: remaining capacity fits boiler
                condition: numeric_state
                entity_id: sensor.inverter_5000_24_remaining_capacity
                above: 2800
            then:
              - data:
                  preset_mode: activity
                target:
                  entity_id: climate.kozolec_boiler
                action: climate.set_preset_mode
                alias: Set to Activity
        alias: Set to activity
      - conditions:
          - condition: numeric_state
            entity_id: sensor.sbms0_charge
            above: 40
        sequence:
          - if:
              - alias: Mode Not Eco
                condition: or
                conditions:
                  - condition: state
                    entity_id: climate.kozolec_boiler
                    attribute: preset_mode
                    state: away
                  - condition: state
                    entity_id: climate.kozolec_boiler
                    attribute: preset_mode
                    state: activity
            then:
              - data:
                  preset_mode: eco
                target:
                  entity_id: climate.kozolec_boiler
                action: climate.set_preset_mode
                alias: Set to Eco
        alias: Set to Eco
      - conditions: []
        sequence:
          - if:
              - alias: Mode Not Away
                condition: or
                conditions:
                  - condition: state
                    entity_id: climate.kozolec_boiler
                    attribute: preset_mode
                    state: eco
                  - condition: state
                    entity_id: climate.kozolec_boiler
                    attribute: preset_mode
                    state: activity
            then:
              - data:
                  preset_mode: away
                target:
                  entity_id: climate.kozolec_boiler
                action: climate.set_preset_mode
                alias: Set to away
        alias: Set to Away
  - delay:
      hours: 0
      minutes: 0
      seconds: 10
      milliseconds: 0
  - alias: Turn On or Off
    choose:
      - conditions:
          - condition: numeric_state
            entity_id: sensor.sbms0_charge
            above: 30
          - alias: remaining capacity
            condition: numeric_state
            entity_id: sensor.inverter_5000_24_remaining_capacity
            above: 2800
        sequence:
          - target:
              entity_id: climate.kozolec_boiler
            action: climate.turn_on
            data: {}
      - conditions:
          - condition: or
            conditions:
              - alias: close to capacity
                condition: numeric_state
                entity_id: sensor.inverter_5000_24_remaining_capacity
                below: 600
              - condition: numeric_state
                entity_id: sensor.sbms0_charge
                below: 20
        sequence:
          - target:
              entity_id: climate.kozolec_boiler
            action: climate.turn_off
            data: {}
  - if:
      - condition: trigger
        id:
          - override
    then:
      - data:
          preset_mode: eco
        target:
          entity_id: climate.kozolec_boiler
        action: climate.set_preset_mode
        alias: Set to Eco
mode: single
