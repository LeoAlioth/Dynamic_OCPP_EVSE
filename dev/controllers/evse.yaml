alias: EVSE Controller
description: >
  Unified automation for controlling Kozolec EVSE (charging) and dynamically
  adjusting SOC thresholds based on solar forecast. Load priority: 1 (highest) —
  EVSE > Boiler > Pump > Bathroom. Boiler and pump yield to the EVSE via their
  own remaining_capacity checks. Dead band: turn on above 4200 W, turn off below
  500 W. Stops and notifies on inverter high-temperature alarm. The EVSE is a
  dumb on/off smart outlet — it cannot throttle.
triggers:
  - entity_id:
      - sensor.sbms0_charge
      - input_number.car_charger_minimum
      - input_number.car_charger_resume
      - sensor.kozolec_allowed_evse_discharge
      - input_boolean.kozolec_charger_auto
    trigger: state
  - minutes: "5"
    trigger: time_pattern
  - trigger: homeassistant
    event: start
  - entity_id:
      - sensor.inverter_5000_24_remaining_capacity
    above: 4200
    for: "00:00:30"
    trigger: numeric_state
  - entity_id:
      - sensor.inverter_5000_24_remaining_capacity
    below: 500
    for: "00:00:05"
    trigger: numeric_state
  - trigger: state
    entity_id: binary_sensor.inverter_5000_24_high_temperature_alarm
    to: "on"
    id: inverter_alarm
conditions: []
actions:
  - alias: Set SOC limits
    if:
      - condition: state
        entity_id: input_boolean.kozolec_charger_auto
        state: "on"
    then:
      - data:
          value: |-
            {{
              ([ [states('sensor.kozolec_allowed_evse_discharge') | int, 30] | max , 95 ] | min)
            }}
        target:
          entity_id: input_number.car_charger_minimum
        action: input_number.set_value
      - data:
          value: |-
            {{
              ([ [states('sensor.kozolec_allowed_evse_discharge') | int, 30] | max , 95 ] | min) + 5
            }}
        target:
          entity_id: input_number.car_charger_resume
        action: input_number.set_value
  - choose:
      - conditions:
          - condition: numeric_state
            entity_id: sensor.sbms0_charge
            above: input_number.car_charger_resume
          - alias: remaining capacity fits EVSE
            condition: numeric_state
            entity_id: sensor.inverter_5000_24_remaining_capacity
            above: 4200
          - alias: inverter not overheating
            condition: state
            entity_id: binary_sensor.inverter_5000_24_high_temperature_alarm
            state: "off"
          - condition: state
            entity_id: switch.shellypro4pm_kozolec_switch_0
            state: "off"
        sequence:
          - target:
              device_id: 5abc921032295837960f8de5b2382102
            action: switch.turn_on
            data: {}
        alias: Turn On
      - conditions:
          - condition: or
            conditions:
              - condition: numeric_state
                entity_id: sensor.sbms0_charge
                below: input_number.car_charger_minimum
              - alias: insufficient capacity for EVSE
                condition: numeric_state
                entity_id: sensor.inverter_5000_24_remaining_capacity
                below: 500
              - alias: inverter overheating
                condition: state
                entity_id: binary_sensor.inverter_5000_24_high_temperature_alarm
                state: "on"
          - condition: state
            state: "on"
            entity_id: switch.shellypro4pm_kozolec_switch_0
        sequence:
          - target:
              device_id: 5abc921032295837960f8de5b2382102
            action: switch.turn_off
            data: {}
        alias: Turn Off
  - if:
      - condition: trigger
        id:
          - inverter_alarm
    then:
      - action: notify.mobile_kozolec_energy
        data:
          title: Kozolec Inverter
          message: Inverter high temperature alarm — car charging stopped.
mode: single
